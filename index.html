<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple scientific calculator created by Vatsal Bharkhada.">
    <title>Calculator</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <div class="calculator__wrapper">
        <main class="calculator">
            <section class="calculator__body">
                <div class="body__top">
                    <div class="body__head">
                        <h1 class="body__head-title">Scientific</h1>
                        <button type="button" title="See History" aria-label="See History" class="history-toggle">
                            <svg class="u-icon" aria-hidden="true">
                                <use href="./assets/icons/sprite.svg#history"></use>
                            </svg>
                        </button>
                    </div>
                    <div class="body__error-screen">
                        <!-- Text injected throuhg JavaScript -->
                    </div>
                    <div class="body__display">
                        <input type="text" placeholder="0" name="query-string" class="display-input" id="display">
                    </div>
                    <div class="body__preview">
                        <!-- Text injected throuhg JavaScript -->
                    </div>
                </div>
                <div class="body__bottom">
                    <div class="dropdown-container">
                        <div class="dropdown">
                            <button type="button" class="dropdown-label">
                                <span class="dropdown-icon">
                                    <svg class="u-icon-dropdown" aria-hidden="true">
                                        <use href="./assets/icons/sprite.svg#trigonometry"></use>
                                    </svg>
                                </span>
                                <span class="dropdown-text">Trigonometry</span>
                                <span class="u-chevron-down">
                                    <svg class="u-icon-chevron" aria-hidden="true">
                                        <use href="./assets/icons/sprite.svg#chevron-down"></use>
                                    </svg>
                                </span>
                            </button>
                            <div class="dropdown-options">
                                <ul>
                                    <li><button type="button" class="option">2<sup>nd</sup></button></li>
                                    <li><button type="button" class="option">sin</button></li>
                                    <li><button type="button" class="option">cos</button></li>
                                    <li><button type="button" class="option">tan</button></li>
                                    <li><button type="button" class="option">hyp</button></li>
                                    <li><button type="button" class="option">sec</button></li>
                                    <li><button type="button" class="option">csc</button></li>
                                    <li><button type="button" class="option">cot</button></li>
                                </ul>
                            </div>
                        </div>
                        <div class="dropdown">
                            <button type="button" class="dropdown-label">
                                <span class="u-icon dropdown-icon">
                                    &#119891;&#119909;
                                </span>
                                <span class="dropdown-text">function</span>
                                <span class="u-chevron-down">
                                    <svg class="u-icon-chevron" aria-hidden="true">
                                        <use href="./assets/icons/sprite.svg#chevron-down"></use>
                                    </svg>
                                </span>
                            </button>
                            <div class="dropdown-options">
                                <ul>
                                    <li><button type="button" class="option">&#9122;&#119909;&#9125;</button></li>
                                    <li><button type="button" class="option">&#9123;&#119909;&#9126;</button></li>
                                    <li><button type="button" class="option">&#9121;&#119909;&#9124;</button></li>
                                    <li><button type="button" class="option">rand</button></li>
                                    <li><button type="button" class="option">&rarr;dms</button></li>
                                    <li><button type="button" class="option">&rarr;deg</button></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="body__buttons">
                        <div><button dataType="" dataDisplay="" dataExpression="" class="calculator-button button-dark" type="button" aria-label="second function">2<sup>nd</sup></button></div>
                        <div><button dataType="constant" dataDisplay="&pi;" dataExpression="Math.PI" class="calculator-button button-dark" type="button" aria-label="pi">&pi;</button></div>
                        <div><button dataType="constant" dataDisplay="e" dataExpression="Math.E" class="calculator-button button-dark" type="button" aria-label="euler number">e</button></div>
                        <div><button dataType="action" dataDisplay="" dataExpression="clearDisplay" class="calculator-button button-dark" type="button" aria-label="clear">C</button></div>
                        <div><button dataType="action" dataDisplay="" dataExpression="clear" class="calculator-button button-dark" type="button" aria-label="delete"><svg class="u-icon"><use href="./assets/icons/sprite.svg#delete"></use></svg></button></div>

                        <div><button dataType="function" dataDisplay="^2" dataExpression="**2" class="calculator-button button-dark" type="button" aria-label="square">x²</button></div>
                        <div><button dataType="function" dataDisplay="1/(" dataExpression="1/(" class="calculator-button button-dark" type="button" aria-label="reciprocal">1/x</button></div>
                        <div><button dataType="function" dataDisplay="⌈" dataExpression="Math.ceil(" class="calculator-button button-dark" type="button" aria-label="ceiling">⌈x⌉</button></div>
                        <div><button dataType="function" dataDisplay="*10^" dataExpression="*10**" class="calculator-button button-dark" type="button" aria-label="exponential">exp</button></div>
                        <div><button dataType="function" dataDisplay="|(" dataExpression="Math.abs(" class="calculator-button button-dark" type="button" aria-label="modulo">mod</button></div>

                        <div><button dataType="function" dataDisplay="√(" dataExpression="Math.sqrt(" class="calculator-button button-dark" type="button" aria-label="square root">√x</button></div>
                        <div><button dataType="operator" dataDisplay="(" dataExpression="(" class="calculator-button button-dark" type="button" aria-label="open bracket">(</button></div>
                        <div><button dataType="operator" dataDisplay=")" dataExpression=")" class="calculator-button button-dark" type="button" aria-label="close bracket">)</button></div>
                        <div><button dataType="function" dataDisplay="!" dataExpression="" class="calculator-button button-dark" type="button" aria-label="factorial">x!</button></div>
                        <div><button dataType="operator" dataDisplay="/" dataExpression="/" class="calculator-button button-dark" type="button" aria-label="divide">&divide;</button></div>

                        <div><button dataType="function" dataDisplay="^" dataExpression="**" class="calculator-button button-dark" type="button" aria-label="power">xʸ</button></div>
                        <div><button dataType="digit" dataDisplay="7" dataExpression="7" class="calculator-button" type="button" aria-label="seven">7</button></div>
                        <div><button dataType="digit" dataDisplay="8" dataExpression="8" class="calculator-button" type="button" aria-label="eight">8</button></div>
                        <div><button dataType="digit" dataDisplay="9" dataExpression="9" class="calculator-button" type="button" aria-label="nine">9</button></div>
                        <div><button dataType="operator" dataDisplay="*" dataExpression="*" class="calculator-button button-dark" type="button" aria-label="multiply">&times;</button></div>

                        <div><button dataType="function" dataDisplay="10^" dataExpression="10**" class="calculator-button button-dark" type="button" aria-label="ten power">10ˣ</button></div>
                        <div><button dataType="digit" dataDisplay="4" dataExpression="4" class="calculator-button" type="button" aria-label="four">4</button></div>
                        <div><button dataType="digit" dataDisplay="5" dataExpression="5" class="calculator-button" type="button" aria-label="five">5</button></div>
                        <div><button dataType="digit" dataDisplay="6" dataExpression="6" class="calculator-button" type="button" aria-label="six">6</button></div>
                        <div><button dataType="operator" dataDisplay="-" dataExpression="-" class="calculator-button button-dark" type="button" aria-label="subtract">&minus;</button></div>

                        <div><button dataType="function" dataDisplay="log(" dataExpression="Math.log10(" class="calculator-button button-dark" type="button" aria-label="log base 10">log</button></div>
                        <div><button dataType="digit" dataDisplay="1" dataExpression="1" class="calculator-button" type="button" aria-label="one">1</button></div>
                        <div><button dataType="digit" dataDisplay="2" dataExpression="2" class="calculator-button" type="button" aria-label="two">2</button></div>
                        <div><button dataType="digit" dataDisplay="3" dataExpression="3" class="calculator-button" type="button" aria-label="three">3</button></div>
                        <div><button dataType="operator" dataDisplay="+" dataExpression="+" class="calculator-button button-dark" type="button" aria-label="add">&plus;</button></div>

                        <div><button dataType="function" dataDisplay="ln(" dataExpression="Math.log(" class="calculator-button button-dark" type="button" aria-label="natural log">ln</button></div>
                        <div><button dataType="function" dataDisplay="" dataExpression="toggleSign" class="calculator-button" type="button" aria-label="toggle sign">±</button></div>
                        <div><button dataType="digit" dataDisplay="0" dataExpression="0" class="calculator-button" type="button" aria-label="zero">0</button></div>
                        <div><button dataType="digit" dataDisplay="." dataExpression="." class="calculator-button" type="button" aria-label="decimal">.</button></div>
                        <div><button dataType="action" dataDisplay="" dataExpression="equals" class="calculator-button button-equals" type="button" aria-label="equals">&equals;</button></div>
                    </div>
                </div>
            </section>
            <aside class="calculator__history">
                <div class="history__head">
                    <button type="button" class="button__title-wrapper">
                        <span class="title-text">History</span>
                        <span class="title-underline"></span>
                    </button>
                </div>
                <div class="history__list">
                    <ul>
                        <li>
                            1 + 2
                        </li>
                    </ul>
                </div>
            </aside>
        </main>
    </div>

    <script src="./scripts/index.js" type="module"></script>
</body>
</html>
